<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>nev's website</title>
    <link rel="stylesheet" href="./style/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Instrument+Serif:ital@0;1"
        rel="stylesheet">
</head>

<body>
    <div class="title-box grotesk">
        <div class="title-text">
            <div class="title-row">
                <div class="title-1 light">hello.</div>
                <div class="title-2">this is nev.</div>
            </div>
        </div>
        <div class="full-width-divider"></div>
    </div>
    <div class="column-box">
        <div class="row-box">
            <div class="row-box grotesk" style="height: 20em; width: 50vw">
                <div class="column-box grid-margin space-between">
                    <div class="plain-text light serif big follow-cursor">My Projects</div>
                    <div class="column-box">
                        <div class="follow-box follow-cursor">
                            <div class="plain-text small link">Design Library</div>
                        </div>
                        <div class="follow-box follow-cursor">
                            <div class="plain-text small link">Music</div>
                        </div>
                        <div class="follow-box follow-cursor">
                            <div class="plain-text small link">Sample Pack</div>
                        </div>
                    </div>
                </div>
                <div class="full-height-divider"></div>
            </div>
            <div class="row-box grotesk" style="height: 20em; width: 50vw">
                <div class="column-box grid-margin space-between">
                    <div class="plain-text light serif big follow-cursor">About Me</div>
                    <div class="column-box">
                        <div class="follow-box follow-cursor">
                            <div class="plain-text small link">Designer</div>
                        </div>
                        <div class="follow-box follow-cursor">
                            <div class="plain-text small link">Developer</div>
                        </div>
                        <div class="follow-box follow-cursor">
                            <div class="plain-text small link">Musician</div>
                        </div>
                        <div class="follow-box follow-cursor">
                            <div class="plain-text small link">Student</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="full-width-divider"></div>
    </div>

</body>
<script src="./js/index.js"></script>

</html>
